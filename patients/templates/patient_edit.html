<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient</title>

    <style>
        /* Same styling as create page */
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', Tahoma;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 20px 30px;
            background: rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
        }

        .navbar-brand {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .back-btn {
            background: white;
            color: #667eea;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<nav>
    <div class="navbar-brand">HealthStack-HMS</div>
    <a href="/patients" class="back-btn">← Patients</a>
</nav>

<div class="content">
    <div class="form-container">
        <h1>Edit Patient</h1>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="name" value="{{ patient.name }}">
            <input type="text" name="phone" value="{{ patient.phone }}">
            <button type="submit">Save Changes</button>
        </form>
    </div>
</div>

</body>
</html>
