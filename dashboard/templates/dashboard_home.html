
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 20px 30px;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
        }

        @media(max-width: 500px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="navbar-brand">HospitalSys</div>
</nav>

<div class="content">
    <div class="dashboard">

        <div class="card" onclick="location.href='/patients'">
            <h2>Patients</h2>
        </div>

        <div class="card" onclick="location.href='/doctors'">
            <h2>Doctors</h2>
        </div>

        <div class="card" onclick="location.href='/appointments'">
            <h2>Appointments</h2>
        </div>
         <div class="card" onclick="location.href='/dashboard/ai'">
            <h2>AI Assistant</h2>
        </div>

        

        <div class="card" onclick="location.href='/logout'">
            <h2>Logout</h2>
        </div>

    </div>
</div>

</body>
</html>
